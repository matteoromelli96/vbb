<div class="container">
  <div class="reviews-head mb-4">
    <div>
      <div class="section-kicker">VB&B • Recensioni</div>
      <h2 class="h1 mb-1">Dicono di noi</h2>
      <p class="text-secondary mb-0">Alcune recensioni selezionate in stile Booking.</p>
    </div>

    <a class="btn btn-outline-dark"
       href="https://www.booking.com/hotel/it/albergo-ristorante-la-villetta.it.html"
       target="_blank" rel="noopener">
      <i class="fa-solid fa-calendar-check me-2"></i>Leggi tutte su Booking
    </a>
  </div>

  <div id="reviewsCarousel" class="carousel slide reviews-booking-carousel" data-bs-ride="carousel" data-bs-interval="5200">

    <!-- Carosello 1 delle recensioni -->
    <div class="carousel-inner"></div>

    <button class="carousel-control-prev carousel-control-minimal" type="button" data-bs-target="#reviewsCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Precedente</span>
    </button>

    <button class="carousel-control-next carousel-control-minimal" type="button" data-bs-target="#reviewsCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Successiva</span>
    </button>

    <!-- Carosello 2 delle recensioni -->
    <div class="carousel-indicators reviews-dots-booking"></div>
  </div>
</div>
