             <div class="fw-semibold text-white site-name"></div>

        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Chiudi"></button>
      </div>

      <div class="offcanvas-body">
        <nav class="nav flex-column gap-1">
          <a class="nav-link" href="#home" data-bs-dismiss="offcanvas">Home</a>
          <a class="nav-link" href="#struttura" data-bs-dismiss="offcanvas">Struttura</a>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script JS custom -->

  <script src="Js/gallery.js"></script>
  <script src="Js/hero.js"></script>
  <script src="Js/reviews.js"></script>
  <script src="Js/rooms.js"></script>
  <script src="Js/services.js"></script>

  <script src="Js/components.js"></script>
  <script src="Js/builders.js"></script>

  <script src="Js/app.js"></script>
  <script src="Js/animations.js"></script>
  <script src="Js/include.js"></script>

  <script>
    // Year
    const y = new Date().getFullYear();
    document.querySelectorAll('#year').forEach(el => el.textContent = y);

    // MENU MOBILE: chiude offcanvas e poi scrolla correttamente alla sezione
    const offcanvasEl = document.getElementById('sidebarOffcanvas');

    document.querySelectorAll('#sidebarOffcanvas .nav-link').forEach(link => {
      link.addEventListener('click', function (e) {
        const targetId = this.getAttribute('href');

        // gestisce solo i link ancora interni alla pagina
        if (targetId && targetId.startsWith('#')) {
          e.preventDefault();

          const targetEl = document.querySelector(targetId);
          const offcanvasInstance = bootstrap.Offcanvas.getOrCreateInstance(offcanvasEl);

          const goToSection = () => {
            if (!targetEl) return;

            const topbar = document.querySelector('.mobile-topbar');
            const topbarHeight = topbar ? topbar.offsetHeight : 0;

            const y = targetEl.getBoundingClientRect().top + window.pageYOffset - topbarHeight - 12;

            window.scrollTo({
              top: y,
              behavior: 'smooth'
            });
          };

          // aspetta che il menu si chiuda prima di scrollare
          offcanvasEl.addEventListener('hidden.bs.offcanvas', goToSection, { once: true });
          offcanvasInstance.hide();
        }
      });
    });
  </script>
